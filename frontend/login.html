<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Closet</title>
    <link rel="stylesheet" href="/frontend/design-tokens.css">
    <link rel="stylesheet" href="/frontend/auth.css">
    <link rel="stylesheet" href="/frontend/fonts/inter.css">
    <script>
        (function () {
            var pref = 'light';
            try {
                var u = JSON.parse(localStorage.getItem('user') || '{}');
                pref = u.theme_preference || localStorage.getItem('closet_theme') || 'light';
            } catch (e) {}
            if (pref === 'system') {
                pref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', pref === 'dark' ? 'dark' : 'light');
        })();
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <header class="auth-header">
                <div class="logo">
                    <span class="logo-mark" aria-hidden="true">
                        <svg class="ui-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 3a2 2 0 1 1 0 4"/><path d="M7 14h10l-4-4"/><path d="M5 21h14l-2-7H7l-2 7z"/></svg>
                    </span>
                    <h1>Closet</h1>
                </div>
                <p class="tagline">Organize your wardrobe with AI</p>
            </header>

            <form id="login-form" class="auth-form">
                <h2>Welcome Back</h2>
                <p class="form-subtitle">Sign in to continue</p>

                <div class="form-group">
                    <label for="username">Email or username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="you@email.com" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper input-wrapper--password">
                        <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required>
                        <button type="button" class="input-toggle" id="password-toggle" aria-label="Show password" aria-pressed="false">
                            <span class="input-toggle-icons" aria-hidden="true">
                                <svg class="ui-icon icon-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="ui-icon icon-hide hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </span>
                        </button>
                    </div>
                    <p class="form-forgot">
                        <a href="/frontend/forgot-password.html" class="link link--subtle">Forgot password?</a>
                    </p>
                </div>

                <div id="error-message" class="error-message hidden" role="alert"></div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span class="btn-text">Sign in</span>
                    <span class="btn-loader hidden"><div class="spinner"></div></span>
                </button>

                <div class="form-footer">
                    <p>Don't have an account? <a href="/frontend/register.html" class="link">Create one</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="/frontend/lib/web-utils.js"></script>
    <script src="/frontend/auth.js"></script>
</body>
</html>
