<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password - Closet-Org</title>
    <link rel="stylesheet" href="/frontend/auth.css">
    <link href="/frontend/fonts/inter.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="bg-gradient"></div>
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>
        <div class="bg-circle circle-3"></div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">👕</span>
                    <h1>Closet-Org</h1>
                </div>
            </div>

            <form id="forgot-form" class="auth-form">
                <h2>Reset password</h2>
                <p class="form-subtitle">Enter the email on your account. We will send a link when email is configured.</p>

                <div class="form-group">
                    <label for="forgot-email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="forgot-email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>

                <div id="error-message" class="error-message hidden"></div>

                <button type="submit" class="btn btn-primary" id="forgot-btn">
                    <span class="btn-text">Send reset link</span>
                    <span class="btn-loader hidden">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-footer">
                    <p><a href="/frontend/reset-password.html" class="link">Already have a code?</a></p>
                    <p><a href="/frontend/login.html" class="link">Back to sign in</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="/frontend/auth.js"></script>
</body>
</html>
