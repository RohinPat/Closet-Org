<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password - Closet-Org</title>
    <link rel="stylesheet" href="/frontend/auth.css">
    <link href="/frontend/fonts/inter.css" rel="stylesheet">
    <script>
        (function () {
            var pref = 'light';
            try {
                var u = JSON.parse(localStorage.getItem('user') || '{}');
                pref = u.theme_preference || localStorage.getItem('closet_theme') || 'light';
            } catch (e) {}
            if (pref === 'system') {
                pref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', pref === 'dark' ? 'dark' : 'light');
        })();
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="bg-gradient"></div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-mark" aria-hidden="true"><svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a2 2 0 1 1 0 4"/><path d="M7 14h10l-4-4"/><path d="M5 21h14l-2-7H7l-2 7z"/></svg></span>
                    <h1>Closet-Org</h1>
                </div>
            </div>

            <form id="forgot-form" class="auth-form">
                <h2>Reset password</h2>
                <p class="form-subtitle">Enter the email on your account. We will send a link when email is configured.</p>

                <div class="form-group">
                    <label for="forgot-email">Email</label>
                    <div class="input-wrapper">                        <input type="email" id="forgot-email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>

                <div id="error-message" class="error-message hidden"></div>

                <button type="submit" class="btn btn-primary" id="forgot-btn">
                    <span class="btn-text">Send reset link</span>
                    <span class="btn-loader hidden">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-footer">
                    <p><a href="/frontend/reset-password.html" class="link">Already have a code?</a></p>
                    <p><a href="/frontend/login.html" class="link">Back to sign in</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="/frontend/lib/web-utils.js"></script>
    <script src="/frontend/auth.js"></script>
</body>
</html>
