<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New password - Closet-Org</title>
    <link rel="stylesheet" href="/frontend/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="bg-gradient"></div>
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>
        <div class="bg-circle circle-3"></div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">👕</span>
                    <h1>Closet-Org</h1>
                </div>
            </div>

            <form id="reset-form" class="auth-form">
                <h2>Choose a new password</h2>
                <p class="form-subtitle">Paste the token from your email (or dev tools).</p>

                <div class="form-group">
                    <label for="reset-token">Reset token</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔑</span>
                        <input type="text" id="reset-token" name="token" placeholder="Token" required autocomplete="one-time-code">
                    </div>
                </div>

                <div class="form-group">
                    <label for="reset-password">New password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="reset-password" name="password" placeholder="At least 8 characters, mixed case, digit, symbol" required autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="reset-confirm">Confirm</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="reset-confirm" name="confirm" placeholder="Confirm password" required autocomplete="new-password">
                    </div>
                </div>

                <div id="error-message" class="error-message hidden"></div>

                <button type="submit" class="btn btn-primary" id="reset-btn">
                    <span class="btn-text">Update password</span>
                    <span class="btn-loader hidden">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-footer">
                    <p><a href="/frontend/login.html" class="link">Back to sign in</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="/frontend/auth.js"></script>
</body>
</html>
