name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Actions such as checkout/setup-* run on a JS runtime; opt into Node 24 early
# (GitHub deprecation of Node 20 for Actions). Project Node for npm/Jest stays
# pinned via setup-node `node-version` below.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Backend unit tests
        env:
          CLOSET_SECRET_KEY: ci-test-signing-secret-minimum-32-chars-xx
        run: python -m pytest backend/tests -v --tb=short --cov=backend --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=63

      - name: Bandit (static security scan)
        run: python -m bandit -r backend -ll -c pyproject.toml

      - name: Dependency audit (informational)
        run: pip-audit -r requirements.txt
        continue-on-error: true

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install and test (Jest)
        working-directory: mobile
        run: |
          npm ci
          npm test -- --ci

      - name: npm audit (informational)
        working-directory: mobile
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install-deps chromium
          python -m playwright install chromium

      - name: Start API and run Playwright smoke tests
        env:
          CLOSET_SECRET_KEY: ci-e2e-signing-secret-minimum-32-chars-xx
        run: |
          cd backend
          python -m uvicorn main:app --host 127.0.0.1 --port 8765 &
          cd ..
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8765/healthz && break
            sleep 1
          done
          E2E_BASE_URL=http://127.0.0.1:8765 python -m pytest e2e -v --tb=short
