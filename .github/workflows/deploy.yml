# Deploy to Oracle production after CI passes on main.
# Requires repository secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
# One-time server setup: scripts/setup_github_deploy.sh

name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            INSTALL_DIR=/opt/closet-org
            git config --global --add safe.directory "${INSTALL_DIR}" || true
            if [[ ! -f "${INSTALL_DIR}/scripts/deploy_prod.sh" ]]; then
              echo "Bootstrap: deploy script missing, pulling origin/main..."
              git -C "${INSTALL_DIR}" fetch origin main
              git -C "${INSTALL_DIR}" checkout -B main origin/main
            fi
            sudo bash "${INSTALL_DIR}/scripts/deploy_prod.sh"
